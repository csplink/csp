modes:
  geehy.input:
    geehy.gpio_pull_t:
      - geehy.gpio_pull_up
      - geehy.gpio_pull_down
      - geehy.gpio_pull_no
    geehy.gpio_mode_t:
      - geehy.gpio_mode_input
  geehy.output:
    geehy.gpio_level_t:
      - geehy.gpio_level_low
      - geehy.gpio_level_high
    geehy.gpio_speed_t:
      - geehy.gpio_speed_low
      - geehy.gpio_speed_medium
      - geehy.gpio_speed_high
    geehy.gpio_mode_t:
      - geehy.gpio_mode_output
    geehy.gpio_output_type_t:
      - geehy.gpio_output_pp
      - geehy.gpio_output_od
  geehy.analog:
    geehy.gpio_mode_t:
      - geehy.gpio_mode_analog
  geehy.eventout:
    geehy.gpio_pull_t:
      - geehy.gpio_pull_up
      - geehy.gpio_pull_down
    geehy.gpio_speed_t:
      - geehy.gpio_speed_low
      - geehy.gpio_speed_medium
      - geehy.gpio_speed_high
    geehy.gpio_mode_t:
      - geehy.gpio_mode_alternate
    geehy.gpio_output_type_t:
      - geehy.gpio_output_pp
  geehy.exti:
    geehy.gpio_pull_t:
      - geehy.gpio_pull_up
      - geehy.gpio_pull_down
      - geehy.gpio_pull_no
    geehy.gpio_mode_t:
      - geehy.gpio_mode_input
parameters:
  geehy.gpio_level_t:
    label:
      zh_CN: GPIO电平类型
      en:
    type: enum
    values:
      geehy.gpio_level_low:
        comment:
          zh_CN: 低电平
          en:
      geehy.gpio_level_high:
        comment:
          zh_CN: 高电平
          en:
    displayName:
      zh_CN: 电平
      en:
    description:
      zh_CN: GPIO-电平
      en:
    readonly: false
  geehy.gpio_mode_t:
    label:
      zh_CN: GPIO模式类型
      en:
    type: enum
    values:
      geehy.gpio_mode_analog:
        comment:
          zh_CN: 模拟模式
          en:
      geehy.gpio_mode_input:
        comment:
          zh_CN: 输入模式
          en:
      geehy.gpio_mode_output:
        comment:
          zh_CN: 输出模式
          en:
      geehy.gpio_mode_alternate:
        comment:
          zh_CN: 复用模式
          en:
    displayName:
      zh_CN: 模式
      en:
    description:
      zh_CN: GPIO-模式
      en:
    readonly: false
  geehy.gpio_output_type_t:
    label:
      zh_CN: GPIO输出类型
      en:
    type: enum
    values:
      geehy.gpio_output_pp:
        comment:
          zh_CN: 推挽输出
          en:
      geehy.gpio_output_od:
        comment:
          zh_CN: 开漏输出
          en:
    displayName:
      zh_CN: 输出类型
      en:
    description:
      zh_CN: GPIO-输出类型
      en:
    readonly: false
  geehy.gpio_pull_t:
    label:
      zh_CN: GPIO钳位类型
      en:
    type: enum
    values:
      geehy.gpio_pull_down:
        comment:
          zh_CN: 下拉
          en:
      geehy.gpio_pull_up:
        comment:
          zh_CN: 上拉
          en:
      geehy.gpio_pull_no:
        comment:
          zh_CN: 浮空
          en:
    displayName:
      zh_CN: 钳位
      en:
    description:
      zh_CN: GPIO-钳位
      en:
    readonly: false
  geehy.gpio_speed_t:
    label:
      zh_CN: GPIO速度类型
      en:
    type: enum
    values:
      geehy.gpio_speed_low:
        comment:
          zh_CN: 慢速
          en:
      geehy.gpio_speed_medium:
        comment:
          zh_CN: 中速
          en:
      geehy.gpio_speed_high:
        comment:
          zh_CN: 高速
          en:
      geehy.gpio_speed_very_high:
        comment:
          zh_CN: 超高速
          en:
    displayName:
      zh_CN: 速度
      en:
    description:
      zh_CN: GPIO-速度
      en:
    readonly: false
