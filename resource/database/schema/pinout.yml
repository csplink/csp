$schema: "http://json-schema.org/draft-07/schema#"
type: object
additionalProperties: false
patternProperties:
  "^[A-Za-z0-9_+-]+$":
    type: object
    properties:
      Position:
        type: integer
      Type:
        enum: ["I/O", "Power", "Reset", "NC", "Boot"]
      Functions:
        type: object
        additionalProperties: false
        patternProperties:
          ^.+$:
            type: ["object", "null"] #TODO: null
            properties:
              Type:
                type: ["string"]
              Mode:
                type: ["string"]
            # required:
            #   - Type
            #   - Mode
    required:
      - Position
      - Type
minProperties: 1
