$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  Chips:
    type: object
    additionalProperties: false
    patternProperties:
      "^[A-Za-z0-9_]+$": # Vendor
        type: object
        additionalProperties: false
        patternProperties:
          "^[A-Za-z0-9_]+$": # Series
            type: object
            additionalProperties: false
            patternProperties:
              "^[A-Za-z0-9_]+$": # Line
                type: object
                additionalProperties: false
                patternProperties:
                  "^[A-Za-z0-9_]+$": # Name
                    type: object
                    properties:
                      Core:
                        type: string
                      Current:
                        type: object
                        properties:
                          Lowest:
                            type: number
                          Run:
                            type: number
                        required: ["Lowest", "Run"]
                      Flash:
                        type: integer
                      Frequency:
                        type: integer
                      IO:
                        type: integer
                      Package:
                        type: string
                      Peripherals:
                        type: object
                        patternProperties:
                          "^.+$":
                            type: integer
                      Ram:
                        type: integer
                      Temperature:
                        type: object
                        properties:
                          Max:
                            type: number
                          Min:
                            type: number
                        required: ["Max", "Min"]
                      Voltage:
                        type: object
                        properties:
                          Max:
                            type: number
                          Min:
                            type: number
                        required: ["Max", "Min"]
                    required:
                      - Core
                      - Current
                      - Flash
                      - Frequency
                      - IO
                      - Package
                      - Peripherals
                      - Ram
                      - Temperature
                      - Voltage
required:
  - Chips
