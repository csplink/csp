$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  soc:
    type: object
    additionalProperties: false
    patternProperties:
      "^[A-Za-z0-9_]+$": # Vendor
        type: object
        additionalProperties: false
        patternProperties:
          "^[A-Za-z0-9_]+$": # Series
            type: object
            additionalProperties: false
            patternProperties:
              "^[A-Za-z0-9_]+$": # Line
                type: object
                additionalProperties: false
                patternProperties:
                  "^[A-Za-z0-9_]+$": # Name
                    type: object
                    properties:
                      core:
                        type: string
                      current:
                        type: object
                        properties:
                          lowest:
                            type: number
                          run:
                            type: number
                        required: ["lowest", "run"]
                      flash:
                        type: integer
                      frequency:
                        type: integer
                      io:
                        type: integer
                      package:
                        type: string
                      peripherals:
                        type: object
                        patternProperties:
                          "^.+$":
                            type: integer
                      ram:
                        type: integer
                      temperature:
                        type: object
                        properties:
                          max:
                            type: number
                          min:
                            type: number
                        required: ["max", "min"]
                      voltage:
                        type: object
                        properties:
                          max:
                            type: number
                          min:
                            type: number
                        required: ["max", "min"]
                    required:
                      - core
                      - current
                      - flash
                      - frequency
                      - io
                      - package
                      - peripherals
                      - ram
                      - temperature
                      - voltage
required:
  - soc
