$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  name:
    type: string
    minLength: 1
  clockTree:
    type: string
    minLength: 1
  vendor:
    type: string
    minLength: 1
  vendorUrl:
    $ref: "#/properties/url"
  documents:
    type: object
    additionalProperties: false
    properties:
      dataSheets:
        type: object
        properties:
          ".*":
            type: object
            properties:
              url:
                $ref: "#/properties/url"
            required: ["url"]
      errata:
        $ref: "#/properties/documents/properties/dataSheets"
      references:
        $ref: "#/properties/documents/properties/dataSheets"
  illustrate:
    type: object
    properties:
      en:
        type: ["string", "null"] #TODO: null
      zh_cn:
        type: ["string", "null"] #TODO: null
    required: ["en", "zh_cn"]
  introduction:
    $ref: "#/properties/illustrate"
  modules:
    type: object
    additionalProperties: false
    patternProperties:
      "^[A-Za-z0-9_\\s+-]+$":
        type: object
        additionalProperties: false
        patternProperties:
          "^[A-Za-z0-9_+-]+$":
            type: object
            additionalProperties: false
            properties:
              description:
                $ref: "#/properties/illustrate"
  url:
    type: object
    properties:
      en:
        type: string
        pattern: "http[s]?://(?:[a-zA-Z]|[0-9]|[$-_@.&+]|[!*\\(\\),]|(?:%[0-9a-fA-F][0-9a-fA-F]))+"
      zh_cn:
        type: string
        pattern: "http[s]?://(?:[a-zA-Z]|[0-9]|[$-_@.&+]|[!*\\(\\),]|(?:%[0-9a-fA-F][0-9a-fA-F]))+"
    required: ["en", "zh_cn"]
  targetProject:
    type: object
    additionalProperties: false
    properties:
      XMake:
        type: boolean
      CMake:
        type: boolean
      MdkArm:
        type: array
        items:
          type: string
  hal:
    type: string
    minLength: 1
  hasPowerPad:
    type: boolean
  package:
    type: string
    minLength: 1
  toolchains:
    type: array
    items:
      enum: ["", "arm-none-eabi"]
  linker:
    type: object
    properties:
      defaultHeapSize:
        type: integer
      defaultStackSize:
        type: integer
    required: ["defaultHeapSize", "defaultStackSize"]
required:
  [
    "name",
    "clockTree",
    "vendor",
    "vendorUrl",
    "documents",
    "illustrate",
    "introduction",
    "modules",
    "url",
    "targetProject",
    "hal",
    "hasPowerPad",
    "package",
    "toolchains",
  ]
additionalProperties: false
